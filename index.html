<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トレーニング履歴</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:15px;
}

/* タブ */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.tab{
  padding:8px 12px;
  background:#ddd;
  border-radius:10px;
  cursor:pointer;
}
.tab.active{
  background:#4CAF50;
  color:white;
}

/* 日付ブロック */
.day{
  background:white;
  margin-bottom:10px;
  border-radius:10px;
  padding:10px;
}
.day-title{
  font-weight:bold;
  cursor:pointer;
}
.day-content{
  display:none;
  margin-top:8px;
}

/* MAX */
.max-box{
  background:white;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<h2>トレーニング履歴</h2>

<div class="tabs">
  <div class="tab active" onclick="showTab('2026')">2026年</div>
  <div class="tab" onclick="showTab('2025')">2025年</div>
  <div class="tab" onclick="showTab('max')">MAX</div>
</div>

<div id="content"></div>

<script>

// ===== 手動で登録する種目（ここ重要） =====
const exerciseList = [
"スクワット","ラットプルダウン","シーテッドロウ","ベンチプレス",
"インクラインベンチプレス","サイドレイズ","ブルガリアンスクワット"
];

// ===== ログ（ここに貼る） =====
const logs = {

"2026": `
3/30
スクワット
7kg×10
7kg×10
7kg×10
ラットプルダウン
15kg×10
15kg×10

3/24
スクワット
10kg×10
10kg×12
ラットプルダウン
20kg×10
20kg×10
`,

"2025": `
12/15
スクワット
7kg×10
12kg×12
12kg×12
`
};

// ===== 日付変換 =====
function parseDate(str,year){
  let [m,d]=str.split("/").map(Number);
  return new Date(year,m-1,d);
}

// ===== 表示 =====
function showTab(type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  const container = document.getElementById("content");
  container.innerHTML="";

  if(type==="max"){
    renderMax(container);
    return;
  }

  let text = logs[type];
  let lines = text.split("\n");

  let blocks=[];
  let current=null;

  lines.forEach(l=>{
    l=l.trim();
    if(!l) return;

    if(l.match(/^\d{1,2}\/\d{1,2}$/)){
      if(current) blocks.push(current);
      current={date:l,content:[]};
      return;
    }
    current.content.push(l);
  });
  if(current) blocks.push(current);

  // ソート
  blocks.sort((a,b)=>{
    return parseDate(b.date,type) - parseDate(a.date,type);
  });

  // 描画
  blocks.forEach(b=>{
    let div=document.createElement("div");
    div.className="day";

    let title=document.createElement("div");
    title.className="day-title";
    title.textContent=b.date;

    let content=document.createElement("div");
    content.className="day-content";

    b.content.forEach(c=>{
      let d=document.createElement("div");
      d.textContent=c;
      content.appendChild(d);
    });

    title.onclick=()=>{
      content.style.display = content.style.display==="none"?"block":"none";
    };

    div.appendChild(title);
    div.appendChild(content);
    container.appendChild(div);
  });

}

// ===== MAX計算 =====
function renderMax(container){

  let maxData={};

  exerciseList.forEach(e=>{
    maxData[e]={max:0,date:""};
  });

  Object.keys(logs).forEach(year=>{
    let lines = logs[year].split("\n");
    let currentExercise="";

    lines.forEach(l=>{
      l=l.trim();
      if(!l) return;

      if(l.match(/^\d{1,2}\/\d{1,2}$/)){
        currentDate = l;
        return;
      }

      if(!l.includes("×")){
        if(exerciseList.includes(l)){
          currentExercise = l;
        }
        return;
      }

      let w = l.match(/(\d+(\.\d+)?)/);
      if(!w) return;

      let weight = parseFloat(w[1]);

      if(currentExercise && maxData[currentExercise]){
        if(weight > maxData[currentExercise].max){
          maxData[currentExercise] = {
            max: weight,
            date: year + "/" + currentDate
          };
        }
      }

    });
  });

  let box=document.createElement("div");
  box.className="max-box";

  Object.keys(maxData).forEach(e=>{
    if(maxData[e].max===0) return;

    let div=document.createElement("div");
    div.textContent = `${e}：${maxData[e].max}kg（${maxData[e].date}）`;
    box.appendChild(div);
  });

  container.appendChild(box);
}

// 初期表示
showTab("2026");

</script>

</body>
</html>
