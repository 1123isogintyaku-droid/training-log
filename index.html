<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トレーニングログ</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:10px;
}

h1{
  text-align:center;
}

details{
  background:white;
  border-radius:12px;
  padding:10px;
  margin:10px 0;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

summary{
  font-weight:bold;
  cursor:pointer;
}

.variation{
  margin-left:10px;
  font-size:13px;
  color:#555;
}
</style>

</head>
<body>

<h1>トレーニングログ</h1>

<!-- ===== 種目追加UI ===== -->
<h2>種目追加</h2>
<input id="newExercise" placeholder="種目名">
<select id="partSelect">
<option value="脚">脚</option>
<option value="胸">胸</option>
<option value="背中">背中</option>
<option value="肩">肩</option>
<option value="腕">腕</option>
<option value="体幹">体幹</option>
</select>
<button onclick="addExercise()">追加</button>

<hr>

<div id="daily"></div>
<hr>
<div id="summary"></div>

<script>

// ===== 種目辞書（ここがベース） =====
let EXERCISE_MASTER = {
脚:["スクワット","レッグプレス"],
胸:["ベンチプレス"],
背中:["ラットプルダウン","シーテッドロウ"],
肩:["サイドレイズ"],
腕:["ケーブルプレスダウン"],
体幹:["クランチ"]
};

// ===== ローカル保存読み込み =====
let saved = localStorage.getItem("exerciseMaster");
if(saved){
  EXERCISE_MASTER = JSON.parse(saved);
}

// ===== ログ入力 =====
const log2026 = `
ここに貼る
`;

const log2025 = `
ここに貼る
`;

// ===== パース =====
function parseLog(text,year){
  const lines = text.split("\n");
  let res=[], cur=null;

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;

    if(line.match(/^\d{1,2}\/\d{1,2}$/)){
      cur={year,dateStr:line,dateObj:new Date(year+"-"+line),content:[]};
      res.push(cur);
    }else if(cur){
      cur.content.push(line);
    }
  });
  return res;
}

// ===== セット抽出 =====
function extractSets(line){
  const reg=/(\d+\.?\d*)kg.*?(\d+)/g;
  let m,res=[];
  while((m=reg.exec(line))){
    res.push({w:+m[1],r:+m[2]});
  }
  return res;
}

// ===== 1RM =====
function calc1RM(w,r){
  return Math.round(w*(1+r/30));
}

// ===== 種目マッチ =====
function matchExercise(raw){

  for(const part in EXERCISE_MASTER){
    for(const ex of EXERCISE_MASTER[part]){
      if(raw.includes(ex)){
        return {part,name:ex};
      }
    }
  }

  return {part:"その他",name:raw};
}

// ===== 初期化 =====
function init(){

  let data=[
    ...parseLog(log2026,2026),
    ...parseLog(log2025,2025)
  ];

  data.sort((a,b)=>b.dateObj-a.dateObj);

  renderDaily(data);
  renderSummary(data);
}

// ===== 日別 =====
function renderDaily(data){

  const root=document.getElementById("daily");
  root.innerHTML="";

  data.forEach(day=>{
    const d=document.createElement("details");
    const s=document.createElement("summary");
    s.textContent=day.year+" "+day.dateStr;
    d.appendChild(s);

    day.content.forEach(line=>{
      const div=document.createElement("div");
      div.textContent=line;
      d.appendChild(div);
    });

    root.appendChild(d);
  });
}

// ===== 集計 =====
function renderSummary(data){

  const root=document.getElementById("summary");
  root.innerHTML="";

  const summary={};

  data.forEach(day=>{
    day.content.forEach(line=>{

      const sets=extractSets(line);
      if(!sets.length) return;

      const raw=line.split(" ")[0];
      const m=matchExercise(raw);

      if(!summary[m.part]) summary[m.part]={};
      if(!summary[m.part][m.name]) summary[m.part][m.name]=[];

      summary[m.part][m.name].push(...sets);

    });
  });

  const main=document.createElement("details");
  const ms=document.createElement("summary");
  ms.textContent="種目別まとめ";
  main.appendChild(ms);

  Object.keys(summary).forEach(part=>{

    const p=document.createElement("details");
    const ps=document.createElement("summary");
    ps.textContent=part;
    p.appendChild(ps);

    Object.keys(summary[part]).forEach(name=>{

      const sets=summary[part][name];

      const max=sets.reduce((a,b)=>a.w>b.w?a:b);
      const rm=sets.reduce((a,b)=>
        calc1RM(a.w,a.r)>calc1RM(b.w,b.r)?a:b
      );

      const ex=document.createElement("details");
      const es=document.createElement("summary");
      es.textContent=`${name}（MAX:${max.w}kg / 1RM:${calc1RM(rm.w,rm.r)}kg）`;
      ex.appendChild(es);

      sets.forEach(s=>{
        const div=document.createElement("div");
        div.className="variation";
        div.textContent=`・${s.w}kg × ${s.r}`;
        ex.appendChild(div);
      });

      p.appendChild(ex);
    });

    main.appendChild(p);
  });

  root.appendChild(main);
}

// ===== 種目追加 =====
function addExercise(){

  const name=document.getElementById("newExercise").value.trim();
  const part=document.getElementById("partSelect").value;

  if(!name) return;

  if(!EXERCISE_MASTER[part]){
    EXERCISE_MASTER[part]=[];
  }

  if(!EXERCISE_MASTER[part].includes(name)){
    EXERCISE_MASTER[part].push(name);
  }

  localStorage.setItem("exerciseMaster",JSON.stringify(EXERCISE_MASTER));

  document.getElementById("newExercise").value="";

  init();
}

// ===== 実行 =====
init();

</script>

</body>
</html>
