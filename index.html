.selected-title {

.max-category {

}

.max-header {

}

.max-header:hover {

}

.max-body {

.max-item {

}

.max-name {
  font-weight: bold;
  margin-bottom: 4px;
}

.max-detail {
  margin-left: 10px;
  line-height: 1.7;

let logs = {};
let maxData = {};

function init() {
  parseLogs();
  calculateMax();
  render();
}

function parseLogs() {

  Object.keys(data).forEach(year => {

    logs[year] = {};

    const lines = data[year].split("\n");

    let currentDate = null;
    let currentExercise = null;

    lines.forEach(line => {

      line = line.trim();

      if (!line) return;

      if (line.match(/^\d{1,2}\/\d{1,2}$/)) {

        currentDate = line;
        logs[year][currentDate] = [];
        return;
      }

      const isSetLine =
        line.includes("×") ||
        line.includes("｜") ||
        line.includes("秒") ||
        line.includes("km/h");

      if (isSetLine) {

        if (currentExercise) {
          currentExercise.sets.push(line);
        }

      } else {

        currentExercise = {
          name: line,
          sets: []
        };

        logs[year][currentDate].push(currentExercise);
      }

    });

  });

}

function calculateMax() {

  maxData = {};

  Object.keys(trackedExercises).forEach(category => {

    maxData[category] = [];

    trackedExercises[category].forEach(targetExercise => {

      let maxWeight = null;
      let maxDate = "";

      let latestWeight = null;
      let latestDate = "";

      Object.keys(logs).forEach(year => {

        Object.keys(logs[year]).forEach(date => {

          logs[year][date].forEach(ex => {

            if (ex.name !== targetExercise) return;

            ex.sets.forEach(setLine => {

              const match = setLine.match(/(\d+(\.\d+)?)kg/i);

              if (!match) return;

              const weight = parseFloat(match[1]);

              if (maxWeight === null || weight > maxWeight) {
                maxWeight = weight;
                maxDate = `${year}/${date}`;
              }

              latestWeight = weight;
              latestDate = `${year}/${date}`;

            });

          });

        });

      });

      maxData[category].push({
        name: targetExercise,
        maxWeight,
        maxDate,
        latestWeight,
        latestDate
      });

    });

  });

}

function render() {

  const tabs = document.getElementById("tabs");
  const content = document.getElementById("content");

  tabs.innerHTML = "";
  content.innerHTML = "";

  const tabNames = [...Object.keys(logs).sort((a,b)=>b-a), "MAX重量"];

  tabNames.forEach((tabName, index) => {

    const btn = document.createElement("div");
    btn.className = "tab-btn" + (index === 0 ? " active" : "");
    btn.textContent = tabName;
    btn.onclick = () => switchTab(tabName);

    tabs.appendChild(btn);

    const page = document.createElement("div");
    page.className = "page" + (index === 0 ? " active" : "");
    page.id = "page-" + tabName;

    if (tabName === "MAX重量") {
      renderMaxPage(page);
    } else {
      renderYearPage(tabName, page);
    }

    content.appendChild(page);

  });

}

function renderYearPage(year, container) {

  const dates = Object.keys(logs[year]);

  const months = [...new Set(
    dates.map(date => date.split("/")[0])
  )].sort((a,b)=>a-b);

  if (months.length === 0) {
    container.innerHTML = "ログなし";
    return;
  }

  let currentMonth = months[months.length - 1];

  const controls = document.createElement("div");
  controls.className = "calendar-controls";

  const monthSelect = document.createElement("select");
  monthSelect.className = "calendar-select";

  months.forEach(month => {

    const option = document.createElement("option");
    option.value = month;
    option.textContent = `${month}月`;

    if (month === currentMonth) {
      option.selected = true;
    }

    monthSelect.appendChild(option);
  });

  controls.appendChild(monthSelect);
  container.appendChild(controls);

  const calendarWrap = document.createElement("div");
  container.appendChild(calendarWrap);

  const selectedArea = document.createElement("div");
  selectedArea.className = "selected-date-area";
  container.appendChild(selectedArea);

  function drawCalendar(month) {

    calendarWrap.innerHTML = "";

    const headers = ["日","月","火","水","木","金","土"];

    const grid = document.createElement("div");
    grid.className = "calendar-grid";

    headers.forEach(h => {

      const header = document.createElement("div");
      header.className = "calendar-header";
      header.textContent = h;

      grid.appendChild(header);

    });

    const yearNum = parseInt(year);
    const monthNum = parseInt(month);

    const firstDay = new Date(yearNum, monthNum - 1, 1).getDay();
    const lastDate = new Date(yearNum, monthNum, 0).getDate();

    for (let i = 0; i < firstDay; i++) {

      const empty = document.createElement("div");
      empty.className = "calendar-day empty";

      grid.appendChild(empty);
    }

    for (let day = 1; day <= lastDate; day++) {

      const dateKey = `${monthNum}/${day}`;

      const cell = document.createElement("div");
      cell.className = "calendar-day";

      const dayNum = document.createElement("div");
      dayNum.className = "day-number";
      dayNum.textContent = day;

      cell.appendChild(dayNum);

      if (logs[year][dateKey]) {

        const dot = document.createElement("div");
        dot.className = "training-dot";

        cell.appendChild(dot);

        cell.onclick = () => {

          document.querySelectorAll(".calendar-day").forEach(el => {
            el.classList.remove("active");
          });

          cell.classList.add("active");

          showWorkout(dateKey);
        };

      } else {

        cell.style.opacity = "0.5";
      }

      grid.appendChild(cell);
    }

    calendarWrap.appendChild(grid);
  }

  function showWorkout(dateKey) {

    selectedArea.innerHTML = "";

    const title = document.createElement("div");
    title.className = "selected-title";
    title.textContent = dateKey;

    selectedArea.appendChild(title);

    logs[year][dateKey].forEach(ex => {

      const wrap = document.createElement("div");
      wrap.className = "exercise";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = ex.name;

      const sets = document.createElement("div");
      sets.className = "sets";
      sets.textContent = ex.sets.join("　");

      wrap.appendChild(name);
      wrap.appendChild(sets);

      selectedArea.appendChild(wrap);

    });

  }

  monthSelect.addEventListener("change", () => {

    drawCalendar(monthSelect.value);
    selectedArea.innerHTML = "";

  });

  drawCalendar(currentMonth);

}

function renderMaxPage(container) {

  Object.keys(maxData).forEach(category => {

    const section = document.createElement("div");
    section.className = "max-category";

    const header = document.createElement("div");
    header.className = "max-header";
    header.textContent = `${category} ▼`;

    const body = document.createElement("div");
    body.className = "max-body";

    header.onclick = () => {

      const isOpen = section.classList.contains("open");

      document.querySelectorAll(".max-category").forEach(el => {

        el.classList.remove("open");

        const h = el.querySelector(".max-header");

        if (h) {
          h.textContent = h.textContent.replace("▲", "▼");
        }

      });

      if (!isOpen) {
        section.classList.add("open");
        header.textContent = `${category} ▲`;
      }

    };

    maxData[category].forEach(item => {

      const wrap = document.createElement("div");
      wrap.className = "max-item";

      const name = document.createElement("div");
      name.className = "max-name";
      name.textContent = item.name;

      const detail = document.createElement("div");
      detail.className = "max-detail";

      const maxText = item.maxWeight !== null
        ? `MAX：${item.maxWeight}kg（${item.maxDate}）`
        : "MAX：記録なし";

      const latestText = item.latestWeight !== null
        ? `最新：${item.latestWeight}kg（${item.latestDate}）`
        : "最新：記録なし";

      detail.innerHTML = `
        ${maxText}<br>
        ${latestText}
      `;

      wrap.appendChild(name);
      wrap.appendChild(detail);

      body.appendChild(wrap);

    });

    section.appendChild(header);
    section.appendChild(body);

    container.appendChild(section);

  });

}

function switchTab(name) {

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  document.querySelectorAll(".page").forEach(page => {
    page.classList.remove("active");
  });

  document.querySelectorAll(".tab-btn").forEach(btn => {

    if (btn.textContent === name) {
      btn.classList.add("active");
    }

  });

  document.getElementById("page-" + name).classList.add("active");

}

init();
