// ===== パース =====
function parseLog(text, year){
  const lines = text.split("\n");
  let result = [];
  let current = null;

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;

    if(line.match(/^\d{1,2}\/\d{1,2}$/)){
      current = {
        year,
        dateStr: line,
        dateObj: new Date(`${year}-${line}`),
        content:[]
      };
      result.push(current);
    }else if(current){
      current.content.push(line);
    }
  });

  return result;
}

// ===== セット抽出 =====
function extractSets(line){
  const regex = /(\d+\.?\d*)kg.*?(\d+)/g;
  let match;
  let result = [];

  while((match = regex.exec(line)) !== null){
    result.push({
      w: parseFloat(match[1]),
      r: parseInt(match[2])
    });
  }

  return result;
}

// ===== スクワット分類 =====
function classifySquat(w){
  if([0,2.5,5].some(x => w % 5 === x)) return "スクワット";
  return "スミススクワット";
}

// ===== 部位分類 =====
function getPart(name){
  if(name.includes("スクワット")) return "脚";
  if(name.includes("ラット") || name.includes("ロー")) return "背中";
  if(name.includes("プレス")) return "胸";
  if(name.includes("サイドレイズ") || name.includes("ショルダー")) return "肩";
  if(name.includes("カール")) return "脚";
  if(name.includes("アブドミナル") || name.includes("腹")) return "体幹";
  return "その他";
}

// ===== 正規化 =====
function normalizeExerciseName(name){

  if(name.includes("シーテッド") || name.includes("ローロウ")){
    return {main:"シーテッドロー", sub:extractVariation(name)};
  }

  if(name.includes("ラットプル")){
    return {main:"ラットプルダウン", sub:extractVariation(name)};
  }

  if(name.includes("スクワット")){
    return {main:name.includes("スミス") ? "スミススクワット":"スクワット", sub:""};
  }

  return {main:name, sub:""};
}

// ===== バリエーション =====
function extractVariation(name){
  if(name.includes("上")) return "上";
  if(name.includes("下")) return "下";
  if(name.includes("縦")) return "縦";

  const m = name.match(/(\d+)番/);
  if(m) return m[1]+"番";

  return "通常";
}

// ===== 1RM =====
function calc1RM(w,r){
  return Math.round(w*(1+r/30));
}

// ===== メイン処理 =====
function init(){

  let data = [
    ...parseLog(log2026,2026),
    ...parseLog(log2025,2025)
  ];

  data.sort((a,b)=> b.dateObj - a.dateObj);

  renderDaily(data);
  renderSummary(data);
}

// ===== 日別 =====
function renderDaily(data){

  const root = document.getElementById("daily");

  const byYear = {};
  data.forEach(d=>{
    if(!byYear[d.year]) byYear[d.year]=[];
    byYear[d.year].push(d);
  });

  Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{

    const y = document.createElement("details");
    const ys = document.createElement("summary");
    ys.textContent = year+"年";
    y.appendChild(ys);

    byYear[year].forEach(day=>{
      const d = document.createElement("details");
      const s = document.createElement("summary");
      s.textContent = day.dateStr;
      d.appendChild(s);

      day.content.forEach(line=>{
        const p = document.createElement("div");
        p.textContent = line;
        d.appendChild(p);
      });

      y.appendChild(d);
    });

    root.appendChild(y);
  });
}

// ===== 集計 =====
function renderSummary(data){

  const summary = {};

  data.forEach(day=>{
    day.content.forEach(line=>{

      const sets = extractSets(line);
      if(sets.length===0) return;

      let raw = line.split(" ")[0];

      sets.forEach(set=>{
        let name = raw;

        if(name.includes("スクワット")){
          name = classifySquat(set.w);
        }

        const norm = normalizeExerciseName(name);
        const part = getPart(norm.main);

        if(!summary[part]) summary[part]={};
        if(!summary[part][norm.main]){
          summary[part][norm.main]={sets:[], variations:{}};
        }

        summary[part][norm.main].sets.push(set);

        if(!summary[part][norm.main].variations[norm.sub]){
          summary[part][norm.main].variations[norm.sub]=[];
        }

        summary[part][norm.main].variations[norm.sub].push(set);
      });

    });
  });

  const root = document.getElementById("summary");

  const main = document.createElement("details");
  const ms = document.createElement("summary");
  ms.textContent="種目別まとめ";
  main.appendChild(ms);

  Object.keys(summary).forEach(part=>{

    const p = document.createElement("details");
    const ps = document.createElement("summary");
    ps.textContent=part;
    p.appendChild(ps);

    Object.keys(summary[part]).forEach(name=>{

      const d = summary[part][name];

      const max = d.sets.reduce((a,b)=> a.w>b.w?a:b);
      const rm = d.sets.reduce((a,b)=>
        calc1RM(a.w,a.r)>calc1RM(b.w,b.r)?a:b
      );

      const ex = document.createElement("details");
      const es = document.createElement("summary");
      es.textContent = `${name}（MAX:${max.w}kg / 1RM:${calc1RM(rm.w,rm.r)}kg）`;
      ex.appendChild(es);

      Object.keys(d.variations).forEach(v=>{
        const best = d.variations[v].reduce((a,b)=> a.w>b.w?a:b);

        const div = document.createElement("div");
        div.style.marginLeft="15px";
        div.textContent = `${v}：${best.w}kg × ${best.r}`;
        ex.appendChild(div);
      });

      p.appendChild(ex);
    });

    main.appendChild(p);
  });

  root.appendChild(main);
}

init();

</script>
