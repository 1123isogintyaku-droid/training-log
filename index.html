<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トレーニングログ</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 200px; }
button { margin-top: 10px; }

.tabs { margin-top: 20px; }
.tab-btn {
  padding: 8px 12px;
  margin-right: 5px;
  cursor: pointer;
  border: 1px solid #ccc;
  display: inline-block;
}
.tab-btn.active { background: #333; color: #fff; }

.year { display: none; margin-top: 20px; }
.year.active { display: block; }

details { margin-bottom: 10px; }
.exercise { margin-bottom: 8px; }
.name { font-weight: bold; }
.sets { margin-left: 10px; }
</style>
</head>
<body>

<h2>トレーニングログ管理</h2>

<textarea id="input" placeholder="整形済みログをここに貼る"></textarea>
<br>
<button onclick="loadLogs()">反映</button>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

<script>
let logs = {};

function loadLogs() {
  const text = document.getElementById("input").value;
  const lines = text.split("\n");

  logs = {};
  let currentDate = null;
  let currentExercise = null;
  let currentYear = "2026";

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    // 日付
    if (line.match(/^\d{4}\/\d{1,2}\/\d{1,2}$/)) {
      currentYear = line.split("/")[0];
      currentDate = line;
      if (!logs[currentYear]) logs[currentYear] = {};
      logs[currentYear][currentDate] = [];
      return;
    }

    if (line.match(/^\d{1,2}\/\d{1,2}$/)) {
      currentDate = line;
      if (!logs[currentYear]) logs[currentYear] = {};
      logs[currentYear][currentDate] = [];
      return;
    }

    // セット（整形済み前提）
    if (line.includes("×") || line.includes("秒")) {
      if (currentExercise) {
        currentExercise.sets.push(line);
      }
    } else {
      // 種目
      currentExercise = { name: line, sets: [] };
      logs[currentYear][currentDate].push(currentExercise);
    }
  });

  render();
}

function render() {
  const tabs = document.getElementById("tabs");
  const content = document.getElementById("content");

  tabs.innerHTML = "";
  content.innerHTML = "";

  const years = Object.keys(logs).sort((a,b)=>b-a);

  years.forEach((year, i) => {
    const btn = document.createElement("div");
    btn.className = "tab-btn" + (i===0 ? " active":"");
    btn.textContent = year;
    btn.onclick = () => switchTab(year);
    tabs.appendChild(btn);

    const div = document.createElement("div");
    div.className = "year" + (i===0 ? " active":"");
    div.id = "year-" + year;

    const dates = Object.keys(logs[year]).sort((a,b)=>{
      const [am,ad] = a.split("/").slice(-2).map(Number);
      const [bm,bd] = b.split("/").slice(-2).map(Number);
      return (bm*100+bd)-(am*100+ad);
    });

    dates.forEach(date => {
      const details = document.createElement("details");
      const summary = document.createElement("summary");
      summary.textContent = date;
      details.appendChild(summary);

      logs[year][date].forEach(ex => {
        const exDiv = document.createElement("div");
        exDiv.className = "exercise";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = ex.name;

        const sets = document.createElement("div");
        sets.className = "sets";

        const clean = ex.sets.filter(s => s && s.trim() !== "");
        sets.textContent = clean.join("　");

        exDiv.appendChild(name);
        exDiv.appendChild(sets);
        details.appendChild(exDiv);
      });

      div.appendChild(details);
    });

    content.appendChild(div);
  });
}

function switchTab(year) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".year").forEach(y=>y.classList.remove("active"));

  document.querySelectorAll(".tab-btn").forEach(b=>{
    if (b.textContent === year) b.classList.add("active");
  });

  document.getElementById("year-"+year).classList.add("active");
}
</script>

</body>
</html>
