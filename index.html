// =========================

// =========================

let logs = {};

function init() {
  Object.keys(data).forEach(year => {
    logs[year] = {};
    const lines = data[year].split("\n");

    let currentDate = null;
    let currentExercise = null;

    lines.forEach(line => {
      line = line.trim();
      if (!line) return;

      // 日付判定
      if (line.match(/^\d{1,2}\/\d{1,2}$/)) {
        currentDate = line;
        logs[year][currentDate] = [];
        return;
      }

      // セット判定
      // 通常セット：×
      // HIITセット：｜
      // 秒のみ表記も許可
      const isSetLine =
        line.includes("×") ||
        line.includes("｜") ||
        line.includes("秒") ||
        line.includes("km/h");

      if (isSetLine) {
        if (currentExercise) {
          currentExercise.sets.push(line);
        }
      } else {
        currentExercise = {
          name: line,
          sets: []
        };

        logs[year][currentDate].push(currentExercise);
      }
    });
  });

  render();
}

function render() {
  const tabs = document.getElementById("tabs");
  const content = document.getElementById("content");

  tabs.innerHTML = "";
  content.innerHTML = "";

  const years = Object.keys(logs).sort((a, b) => b - a);

  years.forEach((year, i) => {
    const btn = document.createElement("div");
    btn.className = "tab-btn" + (i === 0 ? " active" : "");
    btn.textContent = year;
    btn.onclick = () => switchTab(year);
    tabs.appendChild(btn);

    const yearDiv = document.createElement("div");
    yearDiv.className = "year" + (i === 0 ? " active" : "");
    yearDiv.id = "year-" + year;

    const monthMap = {};

    Object.keys(logs[year]).forEach(date => {
      const [month] = date.split("/");

      if (!monthMap[month]) {
        monthMap[month] = [];
      }

      monthMap[month].push(date);
    });

    const sortedMonths = Object.keys(monthMap).sort((a, b) => b - a);

    sortedMonths.forEach(month => {
      const monthDetails = document.createElement("details");
      monthDetails.className = "month-group";

      const monthSummary = document.createElement("summary");
      monthSummary.textContent = `${month}月`;
      monthDetails.appendChild(monthSummary);

      const sortedDates = monthMap[month].sort((a, b) => {
        const da = parseInt(a.split("/")[1]);
        const db = parseInt(b.split("/")[1]);
        return db - da;
      });

      sortedDates.forEach(date => {
        const dateDetails = document.createElement("details");

        const dateSummary = document.createElement("summary");
        dateSummary.textContent = date;
        dateDetails.appendChild(dateSummary);

        logs[year][date].forEach(ex => {
          const exDiv = document.createElement("div");
          exDiv.className = "exercise";

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = ex.name;

          const sets = document.createElement("div");
          sets.className = "sets";

          const cleanSets = ex.sets.filter(s => s && s.trim() !== "");

          // 通常セット・HIIT両対応
          sets.textContent = cleanSets.join("　");

          exDiv.appendChild(name);
          exDiv.appendChild(sets);

          dateDetails.appendChild(exDiv);
        });

        monthDetails.appendChild(dateDetails);
      });

      yearDiv.appendChild(monthDetails);
    });

    content.appendChild(yearDiv);
  });
}

function switchTab(year) {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  document.querySelectorAll(".year").forEach(div => {
    div.classList.remove("active");
  });

  document.querySelectorAll(".tab-btn").forEach(btn => {
    if (btn.textContent === year) {
      btn.classList.add("active");
    }
  });

  document.getElementById("year-" + year).classList.add("active");
}

init();
</script>
