<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トレメニュー整形</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:20px;
}
textarea{
  width:100%;
  height:200px;
  border-radius:10px;
  padding:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  margin-right:10px;
}
</style>
</head>

<body>

<h2>トレメニュー整形</h2>

<textarea id="input"></textarea><br>

<button onclick="convert()">整形</button>
<button onclick="copyResult()">コピー</button>

<h3>結果</h3>
<textarea id="output" readonly></textarea>

<script>

function normalize(line){
  return line
    .replace(/[＊*]/g,"×")
    .replace(/セット|set/gi,"")
    .replace(/　/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function expand(line){

  line = normalize(line);

  let parts = line.split(" ");
  let result=[];

  parts.forEach(p=>{

    if(!p) return;

    // ===== 回数だけ（10回とか） → 無視 =====
    if(/^\d+回$/.test(p)) return;

    // ===== 回数→回数 =====
    if(p.includes("→") && p.includes("回")){
      let reps = p.split("→").map(x=>parseInt(x));
      reps.forEach(r=>{
        result.push(`自重×${r}`);
      });
      return;
    }

    // ===== 自重 =====
    if(p.includes("自重")){
      let nums = p.match(/\d+/g);
      if(!nums){
        result.push("自重");
      }else if(nums.length===2){
        for(let i=0;i<nums[1];i++){
          result.push(`自重×${nums[0]}`);
        }
      }else{
        result.push(`自重×${nums[0]}`);
      }
      return;
    }

    // ===== →（重量あり）=====
    if(p.includes("→")){
      let weight = p.match(/(\d+(\.\d+)?)(?=kg|×)/);
      weight = weight ? weight[1] : "";

      let reps = p.split("→").map(x=>parseInt(x));

      reps.forEach(r=>{
        result.push(weight?`${weight}kg×${r}`:`自重×${r}`);
      });
      return;
    }

    // ===== 通常パターン =====
    let nums = p.match(/\d+(\.\d+)?/g);
    if(!nums) return;

    let w,r,s=1;

    if(nums.length===3){
      w=nums[0]; r=nums[1]; s=nums[2];
    }else if(nums.length===2){
      w=nums[0]; r=nums[1];
    }else{
      return;
    }

    for(let i=0;i<s;i++){
      result.push(`${w}kg×${r}`);
    }

  });

  return result;
}

function convert(){

  let lines = document.getElementById("input").value.split("\n");
  let out="";

  lines.forEach(l=>{
    l=l.trim();
    if(!l) return;

    // 日付
    if(l.match(/^\d{1,2}\/\d{1,2}$/)){
      out += "\n"+l+"\n\n";
      return;
    }

    // セット処理
    if(l.includes("×")||l.includes("*")||l.includes("自重")||l.includes("回")){
      let ex = expand(l);
      ex.forEach(x=> out+=x+"\n");
    }else{
      out += "\n"+l+"\n";
    }
  });

  document.getElementById("output").value = out;
}

function copyResult(){
  navigator.clipboard.writeText(
    document.getElementById("output").value
  );
  alert("コピーした 👍");
}

</script>

</body>
</html>
