<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トレーニングログ</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:10px;
}

h1{text-align:center;}

details{
  background:white;
  border-radius:12px;
  padding:10px;
  margin:10px 0;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

summary{
  font-weight:bold;
  cursor:pointer;
}

.item{margin-left:10px;}
</style>

</head>
<body>

<h1>トレーニングログ</h1>

<div id="daily"></div>
<hr>
<div id="summary"></div>

<script>

// ===== 種目辞書 =====
const EXERCISE_MASTER = {
脚:["スクワット","スミス","ブルガリアン","レッグプレス","レッグカール","インナーサイ","アウターサイ","ヒップスラスト"],
胸:["ベンチ","インクライン","チェストプレス"],
背中:["ラットプル","シーテッドロー","ローロウ","フィクスドプル"],
肩:["サイドレイズ","ショルダープレス","アップライトロウ"],
腕:["プレスダウン","キックバック","トライセプス"],
体幹:["クランチ","プランク","腹筋"]
};

// ===== ログ =====
const log2026 = `
ここに貼る
`;

const log2025 = `
ここに貼る
`;

// ===== 日付パース =====
function parseLog(text,year){
  const lines=text.split("\n");
  let res=[],cur=null;

  lines.forEach(l=>{
    l=l.trim();
    if(!l) return;

    if(l.match(/^\d{1,2}\/\d{1,2}$/)){
      cur={year,dateStr:l,dateObj:new Date(year+"-"+l),content:[]};
      res.push(cur);
    }else if(cur){
      cur.content.push(l);
    }
  });
  return res;
}

// ===== 前処理 =====
function normalize(line){
  return line
    .replace(/\*/g,"×")
    .replace(/セット|set/gi,"")
    .replace(/\s+/g,"");
}

// ===== セット抽出（完全版） =====
function extractSets(line){

  line = normalize(line);

  // 「回」を削除
  line = line.replace(/回/g,"");

  // ===== →回数展開 =====
  if(line.includes("→")){
    
    const first = line.split("→")[0]; // 10kg×10
    const weight = parseFloat(first.split("×")[0]);

    if(isNaN(weight)) return [];

    const repsList = line
      .replace(/.*×/,"")
      .split("→")
      .map(r => parseInt(r));

    return repsList
      .filter(r => !isNaN(r))
      .map(r => ({w:weight, r:r}));
  }

  // ===== 通常処理 =====
  const parts = line.split("×");
  if(parts.length < 2) return [];

  const weight = parseFloat(parts[0]);
  const reps = parseInt(parts[1]);

  let sets = 1;
  if(parts[2]) sets = parseInt(parts[2]);

  if(isNaN(weight) || isNaN(reps)) return [];

  let res=[];
  for(let i=0;i<sets;i++){
    res.push({w:weight,r:reps});
  }

  return res;
}

// ===== 1RM =====
function calc1RM(w,r){
  return Math.round(w*(1+r/30));
}

// ===== 種目判定 =====
function getExerciseName(line){

  const raw = line.split("kg")[0].trim();

  if(/^\d/.test(raw)) return null;

  for(const part in EXERCISE_MASTER){
    for(const ex of EXERCISE_MASTER[part]){
      if(raw.includes(ex)){
        return {part,name:ex};
      }
    }
  }

  return {part:"その他",name:raw};
}

// ===== 初期化 =====
function init(){

  let data=[
    ...parseLog(log2026,2026),
    ...parseLog(log2025,2025)
  ];

  data.sort((a,b)=>b.dateObj-a.dateObj);

  renderDaily(data);
  renderSummary(data);
}

// ===== 日別表示 =====
function renderDaily(data){

  const root=document.getElementById("daily");
  root.innerHTML="";

  data.forEach(day=>{
    const d=document.createElement("details");
    const s=document.createElement("summary");
    s.textContent=day.year+" "+day.dateStr;
    d.appendChild(s);

    day.content.forEach(line=>{
      const div=document.createElement("div");
      div.className="item";
      div.textContent=line;
      d.appendChild(div);
    });

    root.appendChild(d);
  });
}

// ===== 種目別まとめ =====
function renderSummary(data){

  const root=document.getElementById("summary");
  root.innerHTML="";

  const summary={};

  data.forEach(day=>{
    day.content.forEach(line=>{

      const sets=extractSets(line);
      if(!sets.length) return;

      const ex=getExerciseName(line);
      if(!ex) return;

      if(!summary[ex.part]) summary[ex.part]={};
      if(!summary[ex.part][ex.name]) summary[ex.part][ex.name]=[];

      summary[ex.part][ex.name].push(...sets);

    });
  });

  const main=document.createElement("details");
  main.open=true;

  const ms=document.createElement("summary");
  ms.textContent="種目別まとめ";
  main.appendChild(ms);

  Object.keys(summary).forEach(part=>{

    const p=document.createElement("details");
    const ps=document.createElement("summary");
    ps.textContent=part;
    p.appendChild(ps);

    Object.keys(summary[part]).forEach(name=>{

      const sets=summary[part][name];

      const max=sets.reduce((a,b)=>a.w>b.w?a:b);
      const rm=sets.reduce((a,b)=>
        calc1RM(a.w,a.r)>calc1RM(b.w,b.r)?a:b
      );

      const ex=document.createElement("details");
      const es=document.createElement("summary");

      es.textContent =
        `${name}（MAX:${max.w}kg / 1RM:${calc1RM(rm.w,rm.r)}kg）`;

      ex.appendChild(es);

      sets.forEach(s=>{
        const div=document.createElement("div");
        div.className="item";
        div.textContent=`${s.w}kg × ${s.r}`;
        ex.appendChild(div);
      });

      p.appendChild(ex);
    });

    main.appendChild(p);
  });

  root.appendChild(main);
}

// ===== 実行 =====
init();

</script>

</body>
</html>
