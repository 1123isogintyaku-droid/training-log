<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>トレーニングログ</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:20px;
}

h1{
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:200px;
  border-radius:10px;
  padding:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

button{
  padding:8px 16px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  margin-right:8px;
  margin-bottom:10px;
}

.log-block{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
}

.date{
  font-weight:bold;
  margin-bottom:8px;
}

</style>

</head>
<body>

<h1>トレーニングログ</h1>

<textarea id="input" placeholder="整形済みログをここに貼る"></textarea><br>

<button onclick="loadLogs()">読み込み</button>
<button onclick="sortLogs(true)">新しい順</button>
<button onclick="sortLogs(false)">古い順</button>

<div id="logs"></div>

<script>

let logs = [];

// ===== 日付パース =====
function parseDate(str){
  let [m,d] = str.split("/").map(Number);
  return new Date(2026, m-1, d);
}

// ===== 読み込み =====
function loadLogs(){

  const input = document.getElementById("input").value;
  const lines = input.split("\n");

  logs = [];
  let current = null;

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;

    // 日付
    if(line.match(/^\d{1,2}\/\d{1,2}$/)){
      if(current) logs.push(current);

      current = {
        date: line,
        content: []
      };
      return;
    }

    if(!current) return;

    current.content.push(line);

  });

  if(current) logs.push(current);

  renderLogs();
}

// ===== ソート =====
function sortLogs(desc){

  logs.sort((a,b)=>{
    return desc
      ? parseDate(b.date) - parseDate(a.date)
      : parseDate(a.date) - parseDate(b.date);
  });

  renderLogs();
}

// ===== 描画 =====
function renderLogs(){

  const container = document.getElementById("logs");
  container.innerHTML = "";

  logs.forEach(log=>{

    const div = document.createElement("div");
    div.className = "log-block";

    let html = `<div class="date">${log.date}</div>`;

    log.content.forEach(line=>{
      html += `<div>${line}</div>`;
    });

    div.innerHTML = html;
    container.appendChild(div);

  });
}

</script>

</body>
</html>
