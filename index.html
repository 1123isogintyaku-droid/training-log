function parseLog(text){
  const days = text.trim().split(/\n(?=\d+\/\d+)/);
  return days.map(day=>{
    const lines = day.split("\n");
    const date = lines[0];
    return {date, content: lines.slice(1)};
  });
}

function classifySquat(weight){
  if(weight % 2.5 === 0) return "スクワット（フリー）";
  return "スミススクワット";
}

function extractSets(line){
  let results = [];
  const match = line.match(/(\d+\.?\d*)kg.*?(\d+)/g);
  if(match){
    match.forEach(m=>{
      const w = parseFloat(m.match(/(\d+\.?\d*)kg/)[1]);
      const r = parseInt(m.match(/(\d+)$/)[1]);
      results.push({w,r});
    });
  }
  return results;
}

function getPart(name){
  if(name.includes("スクワット") || name.includes("ブルガリアン") || name.includes("レッグ")) return "脚";
  if(name.includes("ラット") || name.includes("ロウ") || name.includes("プル")) return "背中";
  if(name.includes("プレス") && !name.includes("ショルダー")) return "胸";
  if(name.includes("ショルダー") || name.includes("レイズ")) return "肩";
  if(name.includes("プレスダウン") || name.includes("キックバック") || name.includes("エクステンション")) return "腕";
  if(name.includes("腹") || name.includes("クランチ") || name.includes("アブ")) return "体幹";
  return "その他";
}

const parsed = parseLog(log);

const dailyDiv = document.getElementById("daily");
const summary = {};

parsed.forEach(day=>{
  const d = document.createElement("details");
  const s = document.createElement("summary");
  s.textContent = day.date;
  d.appendChild(s);

  day.content.forEach(line=>{
    let name = line.split(" ")[0];

    const sets = extractSets(line);

    sets.forEach(set=>{
      if(name.includes("スクワット")){
        name = classifySquat(set.w);
      }

      if(!summary[name]) summary[name] = {part:getPart(name), sets:[]};
      summary[name].sets.push(set);
    });

    const p = document.createElement("div");
    p.textContent = line;
    d.appendChild(p);
  });

  dailyDiv.appendChild(d);
});

const summaryDiv = document.getElementById("summary");

Object.keys(summary).forEach(name=>{
  const data = summary[name];
  const max = data.sets.reduce((a,b)=> (a.w*b.r > b.w*b.r ? a : b));

  const div = document.createElement("div");
  div.innerHTML = `<b>${name}</b>（${data.part}） MAX: ${max.w}kg × ${max.r}`;
  summaryDiv.appendChild(div);
});
